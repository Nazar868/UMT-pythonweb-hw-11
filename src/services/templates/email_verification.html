<!DOCTYPE html>
<html>
<body>
    <p>Вітаємо, {{ username }}!</p>
    <p>Дякуємо за реєстрацію в Contacts API. Щоб підтвердити свою електронну пошту, перейдіть за посиланням нижче:</p>
    <p>
        <a href="http://{{ host }}api/auth/confirmed_email/{{ token }}">
            Підтвердити email
        </a>
    </p>
    <p>Якщо ви не реєструвалися — просто проігноруйте цей лист.</p>
</body>
</html>
